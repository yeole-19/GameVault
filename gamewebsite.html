<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="">
    <title>GameVault</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <?xml version="1.0" encoding="UTF-8"?>
        <?xml version="1.0" encoding="UTF-8"?>
        <svg width="200" height="75" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">

            <defs>
                <!-- Green Gradient -->
                <linearGradient id="gvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00C853" />
                    <stop offset="100%" stop-color="#00FF88" />
                </linearGradient>

                <!-- Metallic gradient -->
                <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#E0E0E0" />
                    <stop offset="100%" stop-color="#9E9E9E" />
                </linearGradient>
            </defs>

            <!-- Background
  <rect width="800" height="300" fill="#0f172a"/> -->

            <!-- Vault Circle -->
            <circle cx="150" cy="150" r="90" fill="url(#gvGradient)" stroke="url(#metal)" stroke-width="8" />

            <!-- Vault inner ring -->
            <circle cx="150" cy="150" r="60" fill="#0f172a" stroke="url(#metal)" stroke-width="4" />

            <!-- Controller shape -->
            <path d="M115 155 
           Q120 135 140 135 
           L160 135 
           Q180 135 185 155 
           Q190 175 170 175 
           L130 175 
           Q110 175 115 155 Z" fill="url(#gvGradient)" stroke="url(#metal)" stroke-width="2" />

            <!-- D-pad -->
            <rect x="130" y="148" width="16" height="6" fill="#FFFFFF" />
            <rect x="135" y="143" width="6" height="16" fill="#FFFFFF" />

            <!-- Buttons -->
            <circle cx="165" cy="150" r="5" fill="#FFFFFF" />
            <circle cx="178" cy="158" r="5" fill="#FFFFFF" />

            <!-- Text -->
            <text x="280" y="165" font-family="Verdana, Geneva, sans-serif" font-size="64" font-weight="bold"
                fill="url(#gvGradient)">
                GameVault
            </text>

        </svg>

        <nav>
            <a href="#">Home</a>
            <a href="#sto">Store</a>
            <a href="#">Deals</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h2>Discover Your Next Adventure</h2>
            <p>
                Explore the best PC and console games, from action-packed shooters to immersive RPGs.
                Build your ultimate library today.
            </p>
            <button>Browse Store</button>
        </div>
        <img src="https://images.unsplash.com/photo-1614179924047-e1ab49a0a0cf?q=80&w=1374&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Gaming setup">
    </section>

    <section class="store" id = "sto">
        <h3>Featured Games</h3>

        <!-- Categories -->
        <div class="categories">
            <button class="cat-btn active" data-category="All">All</button>
            <button class="cat-btn" data-category="Action">Action</button>
            <button class="cat-btn" data-category="RPG">RPG</button>
            <button class="cat-btn" data-category="Adventure">Adventure</button>
            <button class="cat-btn" data-category="Open World">Open World</button>
        </div>

        <div class="grid" id="gameGrid">
            <!-- Games will be loaded dynamically -->
        </div>
    </section>

    <script src="script.js"></script>

</body>

</html>
